<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Activity 2</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <div class="activity-container">
        <h2>JavaScript Activity 2: Dynamic Welcome & Age Checker</h2>
        <p>Enter your details below to test the JavaScript logic.</p>
        
        <div class="form-group">
            <label for="userName">Name:</label>
            <input type="text" id="userName" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="userAge">Age:</label>
            <input type="number" id="userAge" placeholder="Enter your age">
        </div>

        <button id="submitBtn">Process Data</button>

        <div id="outputBox" class="hidden">
            <h3>Output Result:</h3>
            <p id="greetingText"></p>
            <p id="statusText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
